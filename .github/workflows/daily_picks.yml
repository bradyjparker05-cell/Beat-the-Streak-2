name: Daily MLB Hit Picks

on:
  schedule:
    # Run every 30 minutes from 8 AM - 5 PM ET during baseball season
    # GitHub Actions uses UTC time (EDT = UTC-4, so 12-21 UTC = 8 AM-5 PM ET)
    - cron: '*/30 12-21 * 4-10 1-6'  # Every 30 min, Mon-Sat, Apr-Oct, 8 AM-5 PM ET
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  send-picks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run MLB predictor
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
        run: python main.py
