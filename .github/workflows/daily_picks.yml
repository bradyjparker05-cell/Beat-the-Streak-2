name: Daily MLB Hit Picks

on:
  # Only manual triggers and external API calls (cron-job.org)
  # GitHub's scheduler is disabled to prevent double-firing
  workflow_dispatch:

jobs:
  send-picks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run MLB predictor
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
        run: python main.py
